name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Install FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg
      
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p ai-vid-editor
          cp ai-vid-editor ai-vid-editor/
          cp -r ${{ github.workspace }}/assets ai-vid-editor/
          cp -r ${{ github.workspace }}/presets ai-vid-editor/
          cp ${{ github.workspace }}/README.md ai-vid-editor/
          cp ${{ github.workspace }}/LICENSE ai-vid-editor/ 2>/dev/null || true
          tar -czvf ai-vid-editor-${{ matrix.target }}.tar.gz ai-vid-editor
      
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          mkdir ai-vid-editor
          cp ai-vid-editor.exe ai-vid-editor/
          cp -r ${{ github.workspace }}/assets ai-vid-editor/
          cp -r ${{ github.workspace }}/presets ai-vid-editor/
          cp ${{ github.workspace }}/README.md ai-vid-editor/
          7z a ai-vid-editor-${{ matrix.target }}.zip ai-vid-editor
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-vid-editor-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ai-vid-editor-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
