# AI Video Editor Configuration
# ==============================
# This is the PRIMARY way to configure the editor.
# CLI flags are optional overrides.
#
# Save as:
#   - ./ai-vid-editor.toml (project-local)
#   - ~/.config/ai-vid-editor/config.toml (user-global)
#
# Usage:
#   ai-vid-editor --config config.toml
#   ai-vid-editor --project ./my-project

# =============================================================================
# PATHS
# =============================================================================
# All paths can be absolute or relative to this config file

[paths]
# Input video file (for single file processing)
# Example: input = "raw/my-video.mp4"
input = ""

# Input directory (for batch processing)
# Process all videos in this folder
# Example: input_dir = "raw"
input_dir = "watch"

# Output video file (for single file processing)
# Example: output = "edited/my-video.mp4"
output = ""

# Output directory (for batch/watch mode)
# Processed videos go here
output_dir = "output"

# Background music file (single track)
# Example: music = "music/background.mp3"
music = ""

# Background music directory (picks random track)
# Example: music_dir = "music"
music_dir = "music"

# Intro video (prepended to all processed videos)
# Example: intro = "branding/intro.mp4"
intro = ""

# Outro video (appended to all processed videos)
# Example: outro = "branding/outro.mp4"
outro = ""

# =============================================================================
# SILENCE DETECTION
# =============================================================================

[silence]
# Silence detection threshold in decibels
# -25 = Aggressive, -30 = Balanced, -35 = Conservative, -40 = Very conservative
threshold_db = -30.0

# Minimum silence duration to detect (seconds)
# 0.3-0.5 = snappy, 0.5-1.0 = natural
min_duration = 0.5

# Padding around cuts (seconds)
# 0.05-0.1 = tight, 0.15-0.3 = relaxed
padding = 0.1

# How to handle silences: "cut" or "speedup"
mode = "cut"

# Speed multiplier when mode = "speedup" (2.0-4.0 recommended)
speedup_factor = 4.0

# Minimum silence to apply speedup (seconds)
min_silence_for_speedup = 0.5

# =============================================================================
# FILLER WORD REMOVAL
# =============================================================================

[filler_words]
# Enable filler word removal (requires Whisper STT)
enabled = false

# Words to remove (only words that are ALWAYS fillers)
words = ["um", "uh", "ah", "er", "hmm", "uhh", "umm"]

# Padding around filler cuts (seconds)
padding = 0.05

# =============================================================================
# AUDIO PROCESSING
# =============================================================================

[audio]
# Enable audio enhancement (loudnorm + speech EQ)
enhance = true

# Enable noise reduction (removes fans, AC, hiss)
noise_reduction = false

# Target loudness in LUFS
# -14 = YouTube/Spotify, -16 = Podcasts, -18 = Broadcast EBU, -24 = Broadcast ATSC
target_lufs = -14.0

# Music volume during speech (0.0-1.0)
duck_volume = 0.2

# =============================================================================
# EXPORT OPTIONS
# =============================================================================

[export]
# Generate SRT subtitle file
subtitles = false

# Generate YouTube chapters file
chapters = false

# Generate FCPXML for DaVinci Resolve / Premiere Pro
fcpxml = false

# Generate EDL (Edit Decision List)
edl = false

# =============================================================================
# WATCH MODE
# =============================================================================

[watch]
# Enable watch mode (monitor input_dir for new videos)
enabled = false

# Polling interval in seconds
interval = 5

# =============================================================================
# PRESETS (quick start)
# =============================================================================
# Uncomment ONE preset below to use instead of manual config:

# --- YouTube Long-form ---
# [silence]
# mode = "cut"
# padding = 0.15
# [audio]
# enhance = true
# target_lufs = -14.0
# [export]
# chapters = true
# fcpxml = true

# --- YouTube Shorts / TikTok ---
# [silence]
# mode = "speedup"
# speedup_factor = 3.0
# padding = 0.05
# [audio]
# enhance = true

# --- Podcast ---
# [silence]
# mode = "cut"
# padding = 0.2
# [audio]
# enhance = true
# target_lufs = -16.0
# noise_reduction = true
# [export]
# subtitles = true

# =============================================================================
# EXAMPLE PROJECT SETUP
# =============================================================================
#
# Create a project folder:
#
#   my-youtube-channel/
#   ├── config.toml        # This file
#   ├── watch/             # Drop raw videos here
#   ├── output/            # Processed videos appear here
#   ├── music/             # Background music library
#   │   ├── track1.mp3
#   │   └── track2.mp3
#   ├── intro.mp4          # Your channel intro
#   └── outro.mp4          # Your channel outro
#
# config.toml:
#   [paths]
#   input_dir = "watch"
#   output_dir = "output"
#   music_dir = "music"
#   intro = "intro.mp4"
#   outro = "outro.mp4"
#
#   [audio]
#   enhance = true
#
# Run:
#   ai-vid-editor --project ./my-youtube-channel
#
# Or with watch mode:
#   [watch]
#   enabled = true
#   interval = 5
#
# Then just run:
#   ai-vid-editor --project ./my-youtube-channel
#
# Drop videos into watch/ and they're automatically processed!