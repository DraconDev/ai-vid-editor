<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#181818"/>
      <stop offset="100%" style="stop-color:#101010"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#b42d37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#222" stroke-width="2"/>
  
  <!-- Neural network nodes -->
  <g fill="#e63946" opacity="0.3">
    <circle cx="120" cy="150" r="12"/>
    <circle cx="120" cy="256" r="12"/>
    <circle cx="120" cy="362" r="12"/>
    <circle cx="200" cy="120" r="10"/>
    <circle cx="200" cy="256" r="10"/>
    <circle cx="200" cy="392" r="10"/>
  </g>
  
  <!-- Neural network connections -->
  <g stroke="#e63946" stroke-width="2" opacity="0.2">
    <line x1="132" y1="150" x2="190" y2="120"/>
    <line x1="132" y1="150" x2="190" y2="256"/>
    <line x1="132" y1="256" x2="190" y2="120"/>
    <line x1="132" y1="256" x2="190" y2="256"/>
    <line x1="132" y1="256" x2="190" y2="392"/>
    <line x1="132" y1="362" x2="190" y2="256"/>
    <line x1="132" y1="362" x2="190" y2="392"/>
  </g>
  
  <!-- Main play button / camera shape -->
  <g transform="translate(180, 140)">
    <!-- Camera body -->
    <rect x="0" y="40" width="160" height="152" rx="16" fill="#222"/>
    
    <!-- Play triangle -->
    <polygon points="60,80 60,152 130,116" fill="url(#accentGrad)" filter="url(#glow)"/>
    
    <!-- AI sparkle -->
    <g transform="translate(170, 0)">
      <circle cx="20" cy="20" r="20" fill="url(#accentGrad)" opacity="0.9"/>
      <path d="M20 8 L22 18 L32 20 L22 22 L20 32 L18 22 L8 20 L18 18 Z" fill="#fff"/>
    </g>
  </g>
  
  <!-- Accent bar at top -->
  <rect x="80" y="420" width="352" height="8" rx="4" fill="url(#accentGrad)"/>
  
</svg>
