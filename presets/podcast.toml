# Podcast preset: Conversational audio optimization

[silence]
mode = "cut"
threshold_db = -30.0
min_duration = 0.5
padding = 0.2

[audio]
enhance = true
target_lufs = -16.0
noise_reduction = false

[video]
stabilize = false
color_correct = false
reframe = false
blur_background = false

[export]
subtitles = true
