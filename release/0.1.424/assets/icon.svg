<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Main play button circle with shadow -->
  <circle cx="256" cy="256" r="140" fill="white" filter="url(#shadow)" opacity="0.95"/>

  <!-- Play triangle -->
  <path d="M220 186 L220 326 L340 256 Z" fill="url(#glow)"/>

  <!-- AI sparkle/badge in corner -->
  <circle cx="380" cy="132" r="50" fill="url(#glow)"/>
  <text x="380" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="white">AI</text>

  <!-- Subtle decorative rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>
